# Render 블루프린트 예시 — 저장소 루트에서 웹 서비스로 백엔드만 올릴 때.
# 대시보드에서 CORS_ORIGINS(프론트 URL), 필요 시 MATCH_TICK_MS 등을 추가하세요.
services:
  - type: web
    name: tetherget-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build:deploy
    startCommand: npm run start:api
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: TRUST_PROXY
        value: "1"
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        sync: false
